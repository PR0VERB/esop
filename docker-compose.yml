services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: esop_db
      POSTGRES_USER: esop_user
      POSTGRES_PASSWORD: esop_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esop_user -d esop_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      python manage.py runserver 0.0.0.0:8000

  celery:
    build: .
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      celery -A config worker -l info --concurrency=2

volumes:
  pgdata:

