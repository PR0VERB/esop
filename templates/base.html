<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ESOP Admin{% endblock %}</title>
    {% block extra_head %}{% endblock %}
    <style>
        /* Minimal reset – real styles in static/css/ later */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
               line-height: 1.5; color: #1a1a2e; background: #f5f5f5; }
        .container { max-width: 960px; margin: 0 auto; padding: 1rem; }
        .form-input { display: block; width: 100%; padding: 0.5rem; margin: 0.25rem 0 0.75rem;
                      border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        .btn { display: inline-block; padding: 0.5rem 1.5rem; border: none; border-radius: 4px;
               cursor: pointer; font-size: 1rem; text-decoration: none; }
        .btn-primary { background: #16213e; color: #fff; }
        .btn-primary:hover { background: #0f3460; }
        .alert { padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
        .alert-error { background: #fde8e8; color: #9b1c1c; border: 1px solid #f8b4b4; }
        .alert-success { background: #def7ec; color: #03543f; border: 1px solid #84e1bc; }
        .nav { background: #16213e; color: #fff; padding: 0.75rem 1rem; display: flex;
               justify-content: space-between; align-items: center; }
        .nav a { color: #e2e8f0; text-decoration: none; margin-left: 1rem; }
        .nav a:hover { color: #fff; }
    </style>
</head>
<body>
    <nav class="nav">
        <strong>ESOP Admin</strong>
        <div>
            {% if user.is_authenticated %}
                <span>{{ user.username }}</span>
                <form method="post" action="{% url 'accounts:logout' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn" style="background:transparent;color:#e2e8f0;border:none;cursor:pointer;">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'accounts:login' %}">Login</a>
            {% endif %}
        </div>
    </nav>
    <main class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
