{% extends "base.html" %}
{% block title %}Documents – {{ company.name }}{% endblock %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
    <h1>Documents – {{ company.name }}</h1>
    <a href="{% url 'documents:upload' company_pk=company.pk %}" class="btn btn-primary">
        + Upload Document
    </a>
</div>

<!-- Search / filter bar -->
<form method="get" action="{% url 'documents:list' company_pk=company.pk %}"
      style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
    <input type="text" name="q" value="{{ request.GET.q }}"
           placeholder="Search by title…"
           style="flex: 1; padding: 0.5rem;">
    <select name="category" style="padding: 0.5rem;">
        <option value="">All categories</option>
        {% for value, label in category_choices %}
        <option value="{{ value }}" {% if request.GET.category == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
    <select name="status" style="padding: 0.5rem;">
        <option value="">All statuses</option>
        <option value="quarantine" {% if request.GET.status == "quarantine" %}selected{% endif %}>Quarantine</option>
        <option value="active" {% if request.GET.status == "active" %}selected{% endif %}>Active</option>
        <option value="archived" {% if request.GET.status == "archived" %}selected{% endif %}>Archived</option>
        <option value="rejected" {% if request.GET.status == "rejected" %}selected{% endif %}>Rejected</option>
    </select>
    <button type="submit" class="btn">Search</button>
</form>

<div id="document-table">
    {% include "documents/_document_table.html" %}
</div>
{% endblock %}
